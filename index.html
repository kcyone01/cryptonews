<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRUCIAL FOR MOBILE RESPONSIVENESS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>CryptoTerminal Pro Live</title>
    <style>
        :root {
            --bg-main: #060814;
            --bg-card: #0b1120;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --bullish: #10b981;
            --bearish: #ef4444;
            --accent-google: #3b82f6;
            --accent-yahoo: #a855f7;
            --accent-binance: #f3ba2f;
            --accent-htx: #007aff;
        }

        /* Prevent unwanted mobile horizontal bouncing */
        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0; 
            padding: 0;
            background: var(--bg-main); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Top 10 Ticker Container */
        .ticker-wrap {
            background: #02040a;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            white-space: nowrap;
            padding: 12px 10px;
        }
        .ticker-track {
            display: flex;
            gap: 24px;
            animation: marquee 35s linear infinite;
            width: max-content;
        }
        .ticker-track:hover { animation-play-state: paused; }
        .ticker-item { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; }
        .ticker-rank { color: var(--text-muted); font-size: 10px; }
        .ticker-pct.up { color: var(--bullish); }
        .ticker-pct.down { color: var(--bearish); }

        /* Full Page Fluid Constraints */
        .main-layout { 
            width: 100%;
            max-width: 1700px; 
            margin: 0 auto; 
            padding: 15px;
            box-sizing: border-box;
        }

        /* --- 📱 MOBILE-FIRST HERO AREA LAYOUT (Default: Vertical stack) --- */
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .chart-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px;
            height: 340px; /* Touchscreen ergonomic target height */
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* Hide bulky vertical ads on small screens to keep pages clean */
        .ad-side {
            display: none;
            background: #1e293b20;
            border: 1px dashed #334155;
            border-radius: 8px;
            color: var(--text-muted);
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            box-sizing: border-box;
        }
        .ad-native { width: 100%; height: 65px; margin: 10px 0; background: #1e293b20; border: 1px dashed #334155; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); }

        /* --- 📱 MOBILE-FIRST NEWS COLUMNS (Adaptive Column Repeaters) --- */
        .feed-container { 
            display: grid;
            /* Auto-fit dynamically sizes columns based on screen room */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        
        @media (min-width: 600px) and (max-width: 1024px) {
            /* Forces clean 2x2 grid behavior on common tablet interfaces */
            .feed-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .column { 
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            height: max-content; /* Lets data dictate depth without clipping bottom rows */
        }
        .column-title { 
            font-size: 14px; 
            font-weight: 700; 
            margin: 0 0 15px 0; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Interactive Data News Templates */
        .news-item { 
            background: rgba(255, 255, 255, 0.01); 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            border-left: 3px solid transparent;
            transition: transform 0.2s ease;
        }
        .news-item:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-1px);
        }
        .google-item { border-left-color: var(--accent-google); }
        .yahoo-item { border-left-color: var(--accent-yahoo); }
        .binance-item { border-left-color: var(--accent-binance); }
        .htx-item { border-left-color: var(--accent-htx); }
        
        .news-title { font-weight: 600; color: var(--text-main); text-decoration: none; font-size: 13px; display: block; line-height: 1.4; }
        .news-title:hover { color: #60a5fa; }
        .news-meta { font-size: 10px; color: var(--text-muted); margin-top: 6px; display: flex; justify-content: space-between; }


        /* --- 🖥️ LARGESCREEN DESKTOP DESIGN RULES (Screens broader than 1025px) --- */
        @media (min-width: 1025px) {
            .hero-grid {
                grid-template-columns: 250px 1fr 250px; /* Restore horizontal space dividers */
                align-items: stretch;
            }
            .chart-box {
                height: 426px; /* Return terminal visual index weight */
                padding: 12px;
            }
            .ad-side {
                display: flex; /* Sidebar frames return gracefully to the flanks */
                width: 250px;
                height: 426px;
            }
            .feed-container {
                grid-template-columns: repeat(4, 1fr); /* Clean horizontal split for large monitors */
            }
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <!-- 10-Coin Scrolling Header Ticker -->
    <div class="ticker-wrap"><div class="ticker-track" id="ticker-track">Syncing market indices...</div></div>

    <div class="main-layout">
        
        <!-- Adaptive Hero Deck -->
        <div class="hero-grid">
            <div class="ad-side"><div>Vertical Skyscraper<br>Ad Slot (250x425)</div></div>
            
            <!-- Target Content Window Frame -->
            <div class="chart-box">
                <div id="tradingview_btc" style="height: 100%; width: 100%;"></div>
            </div>
            
            <div class="ad-side"><div>Vertical Skyscraper<br>Ad Slot (250x425)</div></div>
        </div>

        <!-- 4-Channel News Workspace Matrix -->
        <div class="feed-container">
            
            <div class="column">
                <div class="column-title" style="color: var(--accent-google)">💙 Google Aggregation</div>
                <div id="google-feed">Syncing news...</div>
            </div>

            <div class="column">
                <div class="column-title" style="color: var(--accent-yahoo)">💜 Yahoo Finance</div>
                <div id="yahoo-feed">Syncing indicators...</div>
            </div>

            <div class="column">
                <div class="column-title" style="color: var(--accent-binance)">🔶 Binance System Actions</div>
                <div id="binance-feed">Syncing announcements...</div>
            </div>

            <div class="column">
                <div class="column-title" style="color: var(--accent-htx)">🔷 HTX (Huobi) Updates</div>
                <div id="htx-feed">Syncing protocols...</div>
            </div>

        </div>
    </div>

    <!-- Script Implementations -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "width": "100%",
            "height": "100%",
            "symbol": "BINANCE:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_btc"
        });
    </script>

    <script>
        async function fetchTopTenPrices() {
            try {
                const pairs = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT', 'ADAUSDT', 'LINKUSDT', 'DOTUSDT', 'MATICUSDT', 'DOGEUSDT'];
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(pairs)}`);
                const data = await res.json();
                
                let tickerHtml = '';
                const formattedCoins = data.map((coin, index) => {
                    return { 
                        symbol: coin.symbol.replace('USDT', ''), 
                        price: parseFloat(coin.lastPrice), 
                        pct: parseFloat(coin.priceChangePercent), 
                        rank: index + 1 
                    };
                });
                const doubledData = [...formattedCoins, ...formattedCoins];
                doubledData.forEach((coin) => {
                    tickerHtml += `
                        <div class="ticker-item">
                            <span class="ticker-rank">#${coin.rank}</span>
                            <span>${coin.symbol}</span>
                            <span>$${coin.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                            <span class="ticker-pct ${coin.pct >= 0 ? 'up' : 'down'}">${coin.pct >= 0 ? '▲' : '▼'}${Math.abs(coin.pct).toFixed(2)}%</span>
                        </div>
                    `;
                });
                document.getElementById('ticker-track').innerHTML = tickerHtml;
            } catch (err) { }
        }

        async function loadChannel(rssUrl, elementId, itemClass) {
            const cacheBuster = `&_cb=${new Date().getTime()}`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}${cacheBuster}`;
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                let html = '';

                if (data.items && data.items.length > 0) {
                    data.items.slice(0, 7).forEach((item, index) => {
                        html += `
                            <div class="news-item ${itemClass}">
                                <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                                <div class="news-meta">
                                    <span>${item.author || 'Terminal Feed'}</span>
                                    <span>${new Date(item.pubDate).toLocaleDateString([], {month: 'short', day: 'numeric'})}</span>
                                </div>
                            </div>
                        `;
                        if (index === 2 && elementId === 'google-feed') {
                            html += `<div class="ad-native"><div>Sponsored Content Insertion Segment</div></div>`;
                        }
                    });
                    document.getElementById(elementId).innerHTML = html;
                } else {
                    document.getElementById(elementId).innerText = "Awaiting connection update...";
                }
            } catch (err) {
                document.getElementById(elementId).innerText = "Synchronization block active.";
            }
        }

        fetchTopTenPrices();
        setInterval(fetchTopTenPrices, 30000);

        loadChannel('https://news.google.com/rss/search?q=crypto&hl=en-US&gl=US&ceid=US:en', 'google-feed', 'google-item');
        loadChannel('https://finance.yahoo.com/news/rssindex', 'yahoo-feed', 'yahoo-item');
        loadChannel('https://news.google.com/rss/search?q=Binance+listing+announcement&hl=en-US&gl=US&ceid=US:en', 'binance-feed', 'binance-item');
        loadChannel('https://news.google.com/rss/search?q=HTX+Huobi+announcement+listing&hl=en-US&gl=US&ceid=US:en', 'htx-feed', 'htx-item');
    </script>
</body>
</html>
