<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTerminal Ultimate</title>
    <style>
        :root {
            --bg-main: #060814;
            --bg-card: #0b1120;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --bullish: #10b981;
            --bearish: #ef4444;
            --accent-yahoo: #a855f7;
            --accent-google: #3b82f6;
            --accent-binance: #f3ba2f;
            --accent-htx: #007aff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
        }

        /* Top 10 Dynamic Ticker */
        .ticker-wrap {
            background: #02040a;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            white-space: nowrap;
            padding: 12px 10px;
        }
        .ticker-track {
            display: flex;
            gap: 24px;
            animation: marquee 35s linear infinite;
            width: max-content;
        }
        .ticker-track:hover { animation-play-state: paused; }
        .ticker-item { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; }
        .ticker-rank { color: var(--text-muted); font-size: 10px; }
        .ticker-pct.up { color: var(--bullish); }
        .ticker-pct.down { color: var(--bearish); }

        .main-layout { max-width: 1700px; margin: 0 auto; padding: 20px; }

        /* Monetized Placements */
        .ad-banner {
            background: #1e293b30;
            border: 1px dashed #334155;
            border-radius: 6px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            margin: 15px auto;
            text-transform: uppercase;
        }
        .ad-728x90 { width: 100%; max-width: 728px; height: 90px; }
        .ad-native { width: 100%; height: 65px; margin: 10px 0; }

        /* 4 Column Adaptive Grid Layout */
        .feed-container { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px; 
            margin-top: 15px;
        }
        .column { 
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
        }
        .column-title { 
            font-size: 14px; 
            font-weight: 700; 
            margin: 0 0 15px 0; 
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Terminal News Blueprint */
        .news-item { 
            background: rgba(255, 255, 255, 0.01); 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        .news-item:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-1px);
        }
        .yahoo-item { border-left-color: var(--accent-yahoo); }
        .google-item { border-left-color: var(--accent-google); }
        .binance-item { border-left-color: var(--accent-binance); }
        .htx-item { border-left-color: var(--accent-htx); }
        
        .news-title { font-weight: 600; color: var(--text-main); text-decoration: none; font-size: 13px; display: block; line-height: 1.4; }
        .news-title:hover { color: #60a5fa; }
        .news-meta { font-size: 10px; color: var(--text-muted); margin-top: 6px; display: flex; justify-content: space-between; }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div class="ticker-wrap"><div class="ticker-track" id="ticker-track">Loading pricing matrices...</div></div>

    <div class="main-layout">
        
        <div class="ad-banner ad-728x90"><div>Advertisement - Sponsor Leaderboard Block</div></div>

        <div class="feed-container">
            
            <div class="column">
                <div class="column-title" style="color: var(--accent-binance)">🔶 Binance System Actions</div>
                <div id="binance-feed">Loading listings...</div>
            </div>

            <div class="column">
                <div class="column-title" style="color: var(--accent-htx)">🔷 HTX (Huobi) Updates</div>
                <div id="htx-feed">Loading indices...</div>
            </div>

            <div class="column">
                <div class="column-title" style="color: var(--accent-yahoo)">💜 Yahoo Finance</div>
                <div id="yahoo-feed">Loading global macro...</div>
            </div>
            
            <div class="column">
                <div class="column-title" style="color: var(--accent-google)">💙 Google Aggregation</div>
                <div id="google-feed">Loading open web...</div>
            </div>

        </div>
    </div>

    <script>
        async function fetchTopTenPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false&price_change_percentage=24h');
                const data = await res.json();
                let tickerHtml = '';
                const doubledData = [...data, ...data];
                doubledData.forEach((coin, idx) => {
                    const pct = coin.price_change_percentage_24h || 0;
                    tickerHtml += `
                        <div class="ticker-item">
                            <span class="ticker-rank">#${(idx % 10) + 1}</span>
                            <span>${coin.symbol.toUpperCase()}</span>
                            <span>$${coin.current_price.toLocaleString(undefined, {maximumFractionDigits: 2})}</span>
                            <span class="ticker-pct ${pct >= 0 ? 'up' : 'down'}">${pct >= 0 ? '▲' : '▼'}${Math.abs(pct).toFixed(2)}%</span>
                        </div>
                    `;
                });
                document.getElementById('ticker-track').innerHTML = tickerHtml;
            } catch (err) { }
        }

        async function loadChannel(rssUrl, elementId, itemClass) {
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                let html = '';

                if (data.items && data.items.length > 0) {
                    data.items.slice(0, 7).forEach((item, index) => {
                        html += `
                            <div class="news-item ${itemClass}">
                                <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                                <div class="news-meta">
                                    <span>${item.author || 'Official Exchange'}</span>
                                    <span>${new Date(item.pubDate).toLocaleDateString([], {month: 'short', day: 'numeric'})}</span>
                                </div>
                            </div>
                        `;
                        // Internal Column Monitization Trigger
                        if (index === 2 && elementId === 'binance-feed') {
                            html += `<div class="ad-banner ad-native"><div>Inline Sponsor Slot</div></div>`;
                        }
                    });
                    document.getElementById(elementId).innerHTML = html;
                } else {
                    document.getElementById(elementId).innerText = "Awaiting connection update...";
                }
            } catch (err) {
                document.getElementById(elementId).innerText = "Synchronization block active.";
            }
        }

        // Initialize Core Engine Loops
        fetchTopTenPrices();
        setInterval(fetchTopTenPrices, 60000);

        // Targeted API Aggregator endpoints
        loadChannel('https://news.google.com/rss/search?q=site:binance.com/en/support/announcement&hl=en-US&gl=US&ceid=US:en', 'binance-feed', 'binance-item');
        loadChannel('https://news.google.com/rss/search?q=site:htx.com/support/en-us/list/&hl=en-US&gl=US&ceid=US:en', 'htx-feed', 'htx-item');
        loadChannel('https://finance.yahoo.com/news/rssindex', 'yahoo-feed', 'yahoo-item');
        loadChannel('https://news.google.com/rss/search?q=crypto&hl=en-US&gl=US&ceid=US:en', 'google-feed', 'google-item');
    </script>
</body>
</html>
