<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Feed Terminal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 15px; }
        .ticker { display: flex; gap: 15px; background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; overflow-x: auto; }
        .coin { white-space: nowrap; font-size: 14px; }
        .coin span { color: #10b981; }
        
        /* Two Column Layout */
        .feed-container { display: flex; gap: 15px; flex-wrap: wrap; }
        .column { flex: 1; min-width: 280px; }
        .column-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #94a3b8; border-bottom: 2px solid #334155; padding-bottom: 5px; }
        
        .news-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .yahoo-item { border-left: 4px solid #a855f7; } /* Purple for Yahoo */
        .google-item { border-left: 4px solid #3b82f6; } /* Blue for Google */
        
        .news-title { font-weight: 600; color: #f8fafc; text-decoration: none; font-size: 14px; display: block; line-height: 1.4; }
        .news-title:hover { text-decoration: underline; }
        .news-meta { font-size: 11px; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- Real-time Price Ticker -->
    <div class="ticker" id="ticker">Loading live prices...</div>

    <!-- Dual Feed Dashboard -->
    <div class="feed-container">
        <!-- Yahoo Finance Column -->
        <div class="column">
            <div class="column-title">💜 Yahoo Finance Crypto</div>
            <div id="yahoo-feed">Loading...</div>
        </div>
        
        <!-- Google News Column -->
        <div class="column">
            <div class="column-title">💙 Google News</div>
            <div id="google-feed">Loading...</div>
        </div>
    </div>

    <script>
        // Fetch Prices from CoinGecko Public Demo API
        async function fetchPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd');
                const data = await res.json();
                document.getElementById('ticker').innerHTML = `
                    <div class="coin">BTC: <span>$${data.bitcoin.usd.toLocaleString()}</span></div>
                    <div class="coin">ETH: <span>$${data.ethereum.usd.toLocaleString()}</span></div>
                    <div class="coin">SOL: <span>$${data.solana.usd.toLocaleString()}</span></div>
                `;
            } catch (err) {
                document.getElementById('ticker').innerText = "Failed to load prices.";
            }
        }

        // Helper function to fetch and format RSS feeds using free rss2json tool
        async function loadFeed(rssUrl, elementId, itemClass) {
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                let html = '';

                if (data.items && data.items.length > 0) {
                    data.items.slice(0, 8).forEach(item => {
                        html += `
                            <div class="news-item ${itemClass}">
                                <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                                <div class="news-meta">Published: ${new Date(item.pubDate).toLocaleDateString()}</div>
                            </div>
                        `;
                    });
                    document.getElementById(elementId).innerHTML = html;
                } else {
                    document.getElementById(elementId).innerText = "No news found.";
                }
            } catch (err) {
                document.getElementById(elementId).innerText = "Failed to load feed.";
            }
        }

        // Run on load
        fetchPrices();
        
        // Load Yahoo Finance News Feed
        loadFeed('https://finance.yahoo.com/news/rssindex', 'yahoo-feed', 'yahoo-item');
        
        // Load Google News Feed
        loadFeed('https://news.google.com/rss/search?q=crypto&hl=en-US&gl=US&ceid=US:en', 'google-feed', 'google-item');

        // Refresh prices every 60 seconds
        setInterval(fetchPrices, 60000);
    </script>
</body>
</html>
