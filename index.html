<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTerminal Pro</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131a2c;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --bullish: #10b981;
            --bearish: #ef4444;
            --accent-yahoo: #a855f7;
            --accent-google: #3b82f6;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            line-height: 1.5;
        }

        /* 10-Coin Ticker Styling */
        .ticker-wrap {
            background: #020617;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            white-space: nowrap;
            padding: 12px 10px;
        }
        .ticker-track {
            display: flex;
            gap: 24px;
            animation: marquee 35s linear infinite;
            width: max-content;
        }
        .ticker-track:hover { animation-play-state: paused; }
        .ticker-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .ticker-rank { color: var(--text-muted); font-size: 10px; font-weight: normal; }
        .ticker-pct { font-size: 11px; }
        .ticker-pct.up { color: var(--bullish); }
        .ticker-pct.down { color: var(--bearish); }

        /* Container Layout */
        .main-layout {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Ad Slots CSS */
        .ad-banner {
            background: #1e293b50;
            border: 1px dashed #334155;
            border-radius: 6px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px auto;
        }
        .ad-728x90 { width: 100%; max-width: 728px; height: 90px; }
        .ad-300x250 { width: 100%; height: 250px; margin-top: 15px; }
        .ad-inline { width: 100%; height: 75px; margin: 15px 0; }

        /* Grid Layout Columns */
        .feed-container { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px; 
            margin-top: 20px;
        }
        .column { 
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .column-title { 
            font-size: 16px; 
            font-weight: 700; 
            margin: 0 0 15px 0; 
            color: var(--text-main); 
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        
        /* News Item Structure */
        .news-item { 
            background: rgba(255, 255, 255, 0.02); 
            padding: 14px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid transparent;
            transition: all 0.2s ease-in-out;
        }
        .news-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-color);
            transform: translateY(-1px);
        }
        .yahoo-item { border-left: 3px solid var(--accent-yahoo); }
        .google-item { border-left: 3px solid var(--accent-google); }
        
        .news-title { 
            font-weight: 600; 
            color: var(--text-main); 
            text-decoration: none; 
            font-size: 14px; 
            display: block; 
            line-height: 1.4; 
        }
        .news-title:hover { color: #60a5fa; }
        .news-meta { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-top: 8px; 
            display: flex;
            justify-content: space-between;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <!-- 1. Real-time Top 10 Market Ticker -->
    <div class="ticker-wrap">
        <div class="ticker-track" id="ticker-track">Loading real-time market tracking...</div>
    </div>

    <div class="main-layout">
        
        <!-- 2. Header Ad Banner Placement -->
        <div class="ad-banner ad-728x90">
            <div>Advertisement - Sponsor Leaderboard Banner Slot</div>
        </div>

        <!-- 3. Dual Feed Media Grid -->
        <div class="feed-container">
            <!-- Yahoo Finance Column -->
            <div class="column">
                <div class="column-title">
                    <span style="color: var(--accent-yahoo)">●</span> Yahoo Finance Crypto
                </div>
                <div id="yahoo-feed">Loading indices...</div>
            </div>
            
            <!-- Google News Column -->
            <div class="column">
                <div class="column-title">
                    <span style="color: var(--accent-google)">●</span> Google Breaking News
                </div>
                <div id="google-feed">Loading intelligence...</div>
            </div>
        </div>
    </div>

    <script>
        // Fetch Top 10 Coins Dynamically from CoinGecko
        async function fetchTopTenPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false&price_change_percentage=24h');
                const data = await res.json();
                
                let tickerHtml = '';
                // Duplicate items array once to achieve endless infinite scrolling visual effect loop
                const doubledData = [...data, ...data];
                
                doubledData.forEach((coin, idx) => {
                    const pct = coin.price_change_percentage_24h || 0;
                    const isUp = pct >= 0;
                    const rank = (idx % 10) + 1;
                    
                    tickerHtml += `
                        <div class="ticker-item">
                            <span class="ticker-rank">#${rank}</span>
                            <span>${coin.symbol.toUpperCase()}</span>
                            <span>$${coin.current_price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</span>
                            <span class="ticker-pct ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'}${Math.abs(pct).toFixed(2)}%</span>
                        </div>
                    `;
                });
                document.getElementById('ticker-track').innerHTML = tickerHtml;
            } catch (err) {
                document.getElementById('ticker-track').innerText = "Market ticker update delayed. Re-attempting connection...";
            }
        }

        // Fetch RSS Data Streams & Inject Native Content Ad Units
        async function loadFeedWithAds(rssUrl, elementId, itemClass) {
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                let html = '';

                if (data.items && data.items.length > 0) {
                    data.items.slice(0, 8).forEach((item, index) => {
                        html += `
                            <div class="news-item ${itemClass}">
                                <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                                <div class="news-meta">
                                    <span>${item.author || 'Global Feed'}</span>
                                    <span>${new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                </div>
                            </div>
                        `;
                        
                        // Inject Native Mid-Feed Sponsor Blocks for Monetization
                        if (index === 2 && elementId === 'yahoo-feed') {
                            html += `
                                <div class="ad-banner ad-inline">
                                    <div>Sponsored Link / Native Content Ad Slot</div>
                                </div>
                            `;
                        }
                        if (index === 4 && elementId === 'google-feed') {
                            html += `
                                <div class="ad-banner ad-300x250">
                                    <div>Premium Direct Display Ad (300x250 MPU Box)</div>
                                </div>
                            `;
                        }
                    });
                    document.getElementById(elementId).innerHTML = html;
                } else {
                    document.getElementById(elementId).innerText = "No updates detected.";
                }
            } catch (err) {
                document.getElementById(elementId).innerText = "Feed synchronization timeout.";
            }
        }

        // Initialize App Infrastructure
        fetchTopTenPrices();
        loadFeedWithAds('https://finance.yahoo.com/news/rssindex', 'yahoo-feed', 'yahoo-item');
        loadFeedWithAds('https://news.google.com/rss/search?q=crypto&hl=en-US&gl=US&ceid=US:en', 'google-feed', 'google-item');

        // Keep core pricing parameters up-to-date every 60s
        setInterval(fetchTopTenPrices, 60000);
    </script>
</body>
</html>
